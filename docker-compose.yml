services:
  db:
    image: postgres:16-alpine
    container_name: patient_nav_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: patient_nav
      POSTGRES_USER: navigator
      POSTGRES_PASSWORD: navigator_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navigator -d patient_nav"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: patient_nav_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
